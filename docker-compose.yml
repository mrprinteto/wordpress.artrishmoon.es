services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend

  wordpress:
    image: wordpress:php8.3-fpm-alpine
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wordpress_data:/var/www/html
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - backend
      - frontend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_ABSOLUTE_URI: https://${DOMAIN}/phpmyadmin/
    networks:
      - backend
      - frontend

  # DNS-01 challenge via the Cloudflare API. This is required because the
  # domain is proxied (orange cloud): an HTTP-01 challenge could be blocked
  # or redirected at Cloudflare's edge before it reaches this server.
  certbot:
    image: certbot/dns-cloudflare:latest
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL}
      CF_API_TOKEN: ${CF_API_TOKEN}
    entrypoint: /bin/sh /entrypoint.sh
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_logs:/var/log/letsencrypt
      - ./certbot/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - frontend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - wordpress
      - certbot
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    entrypoint: /bin/sh /entrypoint.sh
    volumes:
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - wordpress_data:/var/www/html:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - frontend

networks:
  frontend:
  backend:

volumes:
  db_data:
  wordpress_data:
  certbot_conf:
  certbot_logs: